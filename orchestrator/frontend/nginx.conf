server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # SPA served under /app/. Fall back to index.html for client-side routing.
  location /app/ {
    try_files $uri $uri/ /app/index.html;
  }

  location = /healthz {
    return 200 "ok";
    add_header Content-Type text/plain;
  }
}
